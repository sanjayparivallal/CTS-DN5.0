<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Syntax, Data Types, and Operators</title>
</head>
<body>
    <h1>Question 2</h1>

    <script>
        const eventName = "Community Event";
        const eventDate = "15 June 2026";

        let availableSeats = 25;

        console.log("Event "+eventName);
        console.log("Date : "+eventDate);
        console.log("Available Seats : "+availableSeats);

        availableSeats--;
        console.log("Seats available After registration : "+availableSeats);

        availableSeats++;
        console.log("After Cancellation : "+availableSeats);
    </script>
</body>
</html>
