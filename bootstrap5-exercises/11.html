<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Task 11 - Cards and Media</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-4">
  <div class="container">
    <div class="row g-4">
      <div class="col-md-5">
        <h2>Task 11.1 - Profile Card</h2>
        <div class="card">
          <img src="https://picsum.photos/600/300" class="card-img-top" alt="profile">
          <div class="card-body">
            <h5 class="card-title">John Doe</h5>
            <p class="card-text">Frontend Developer</p>
          </div>
        </div>
      </div>
      <div class="col-md-7">
        <h2>Task 11.2 - Media Style Layout</h2>
        <div class="d-flex gap-3 align-items-start border rounded p-3">
          <img src="https://picsum.photos/100" class="rounded" alt="media">
          <div>
            <h5>Content Title</h5>
            <p class="mb-0">Image aligned left, content on right using Bootstrap flex utilities.</p>
          </div>
        </div>
      </div>
    </div>
    <a class="btn btn-outline-primary mt-3" href="index.html">Back</a>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
