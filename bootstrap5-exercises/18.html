<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Task 18 - JavaScript Plugins</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-4">
  <div class="container">
    <h2>Task 18.1 - Modal</h2>
    <button class="btn btn-primary mb-4" data-bs-toggle="modal" data-bs-target="#m1">Open Modal</button>
    <div class="modal fade" id="m1" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog"><div class="modal-content"><div class="modal-header"><h5 class="modal-title">Demo Modal</h5><button class="btn-close" data-bs-dismiss="modal"></button></div><div class="modal-body">Bootstrap modal content.</div></div></div>
    </div>

    <h2>Task 18.2 - Accordion</h2>
    <div class="accordion" id="acc">
      <div class="accordion-item">
        <h2 class="accordion-header"><button class="accordion-button" data-bs-toggle="collapse" data-bs-target="#c1">Item 1</button></h2>
        <div id="c1" class="accordion-collapse collapse show" data-bs-parent="#acc"><div class="accordion-body">First content</div></div>
      </div>
      <div class="accordion-item">
        <h2 class="accordion-header"><button class="accordion-button collapsed" data-bs-toggle="collapse" data-bs-target="#c2">Item 2</button></h2>
        <div id="c2" class="accordion-collapse collapse" data-bs-parent="#acc"><div class="accordion-body">Second content</div></div>
      </div>
    </div>
    <a class="btn btn-outline-primary mt-3" href="index.html">Back</a>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
