<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Task 9 - Buttons</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-4">
  <div class="container">
    <h2>Task 9.1 - Contextual Buttons</h2>
    <div class="d-flex flex-wrap gap-2 mb-4">
      <button class="btn btn-primary">Primary</button>
      <button class="btn btn-secondary">Secondary</button>
      <button class="btn btn-success">Success</button>
      <button class="btn btn-danger">Danger</button>
      <button class="btn btn-warning">Warning</button>
      <button class="btn btn-info">Info</button>
      <button class="btn btn-outline-primary">Outline</button>
      <button class="btn btn-outline-dark">Outline Dark</button>
    </div>
    <h2>Task 9.2 - Groups and Toggle</h2>
    <div class="btn-group mb-3" role="group">
      <button class="btn btn-outline-secondary">Left</button>
      <button class="btn btn-outline-secondary">Middle</button>
      <button class="btn btn-outline-secondary">Right</button>
    </div>
    <div class="btn-group d-block" role="group">
      <input class="btn-check" type="checkbox" id="c1"><label class="btn btn-outline-primary" for="c1">A</label>
      <input class="btn-check" type="checkbox" id="c2"><label class="btn btn-outline-primary" for="c2">B</label>
      <input class="btn-check" type="checkbox" id="c3"><label class="btn btn-outline-primary" for="c3">C</label>
    </div>
    <a class="btn btn-outline-primary mt-3" href="index.html">Back</a>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
