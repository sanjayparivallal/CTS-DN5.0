<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Task 8 - Forms</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-4 bg-light">
  <div class="container">
    <div class="row g-4">
      <div class="col-md-6">
        <h2>Task 8.1 - Registration Form</h2>
        <form class="card p-3">
          <input class="form-control mb-2" type="text" placeholder="Full Name">
          <input class="form-control mb-2" type="email" placeholder="Email">
          <div class="input-group mb-2"><span class="input-group-text">@</span><input class="form-control" placeholder="Username"></div>
          <div class="form-check mb-3"><input class="form-check-input" type="checkbox" id="agree"><label class="form-check-label" for="agree">I agree</label></div>
          <button class="btn btn-success" type="button">Register</button>
        </form>
      </div>
      <div class="col-md-6">
        <h2>Task 8.2 - Login Floating Form</h2>
        <form class="card p-3">
          <div class="form-floating mb-2"><input id="e" class="form-control" type="email" placeholder="Email"><label for="e">Email</label></div>
          <div class="form-floating mb-2"><input id="p" class="form-control" type="password" placeholder="Password"><label for="p">Password</label></div>
          <button class="btn btn-primary" type="button">Login</button>
        </form>
      </div>
    </div>
    <a class="btn btn-outline-primary mt-3" href="index.html">Back</a>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
